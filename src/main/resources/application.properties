spring.application.name=study
server.port=9090

# Database connection URL (default port for PostgreSQL is 5432)
spring.datasource.url=jdbc:mysql://localhost:3309/my_mysql_db

# Database username and password
spring.datasource.username=user
spring.datasource.password=password123

# Configure JPA/Hibernate properties
# 'update' automatically updates the database schema based on your entities
spring.jpa.hibernate.ddl-auto=update
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
